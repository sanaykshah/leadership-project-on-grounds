<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LPG Admin | Leadership Project on Grounds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,300;1,14..32,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body class="admin-body">
    <header class="admin-top">
      <div class="admin-top-inner">
        <a class="admin-brand" href="/">← Leadership Project on Grounds</a>
        <div id="auth-area"></div>
      </div>
    </header>

    <main class="admin-main">
      <section id="login-section" class="admin-card">
        <h1>Admin sign in</h1>
        <p class="admin-lede">
          Post blog updates and upload gallery images. Use the credentials from your
          <code>.env</code> file (<span class="mono">LPG_ADMIN_USER</span> /
          <span class="mono">LPG_ADMIN_PASSWORD</span>).
        </p>
        <form id="login-form" class="admin-form">
          <label>
            Username
            <input name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            Password
            <input
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>
          <p id="login-error" class="form-error" role="alert" hidden></p>
          <button type="submit" class="btn btn-primary">Sign in</button>
        </form>
      </section>

      <div id="dashboard" hidden>
        <section class="admin-card">
          <h2>New blog post</h2>
          <form id="post-form" class="admin-form">
            <label>
              Title
              <input name="title" type="text" required maxlength="200" />
            </label>
            <label>
              Body
              <textarea name="body" rows="8" required maxlength="20000"></textarea>
            </label>
            <p id="post-msg" class="form-msg" role="status" hidden></p>
            <button type="submit" class="btn btn-primary">Publish post</button>
          </form>
        </section>

        <section class="admin-card">
          <h2>Upload photo</h2>
          <form id="image-form" class="admin-form" enctype="multipart/form-data">
            <label>
              Image (JPEG, PNG, GIF, WebP, max 8 MB)
              <input name="file" type="file" accept="image/jpeg,image/png,image/gif,image/webp" required />
            </label>
            <label>
              Caption (optional)
              <input name="caption" type="text" maxlength="300" placeholder="e.g. Fall retreat 2026" />
            </label>
            <p id="image-msg" class="form-msg" role="status" hidden></p>
            <button type="submit" class="btn btn-primary">Upload to gallery</button>
          </form>
        </section>

        <section class="admin-card">
          <div class="admin-split-head">
            <h2>Published posts</h2>
            <button type="button" class="btn-text" id="refresh-posts">Refresh</button>
          </div>
          <div id="posts-list" class="admin-list"></div>
        </section>

        <section class="admin-card">
          <div class="admin-split-head">
            <h2>Gallery images</h2>
            <button type="button" class="btn-text" id="refresh-images">Refresh</button>
          </div>
          <div id="images-list" class="admin-grid"></div>
        </section>

        <p class="admin-foot">
          <button type="button" class="btn btn-ghost" id="logout-btn">Sign out</button>
        </p>
      </div>
    </main>

    <script src="/js/admin.js"></script>
  </body>
</html>
